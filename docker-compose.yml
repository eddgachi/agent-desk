services:
  office-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: office
      POSTGRES_PASSWORD: officepass
      POSTGRES_DB: office_sim
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - office-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U office -d office_sim"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - office-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://office:officepass@office-db:5432/office_sim
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=deepseek-chat
      - LLM_ENABLED=${LLM_ENABLED:-false}
    volumes:
      - ./backend:/app
    depends_on:
      office-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - office-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --loop asyncio

  celery-worker:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://office:officepass@office-db:5432/office_sim
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=deepseek-chat
      - LLM_ENABLED=${LLM_ENABLED:-false}
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - office-db
    networks:
      - office-network
    command: celery -A app.core.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - office-network

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - office-network

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - office-network

networks:
  office-network:
    driver: bridge

volumes:
  pgdata: